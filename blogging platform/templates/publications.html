{% extends 'base.html' %}
{% block content %}

<style>
  .pubs-wrapper { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  .pubs-section-title {
    font-size: 20px; font-weight: 700; color: #1a1a1a;
    margin-bottom: 1.25rem;
    display: flex; align-items: center; gap: 10px;
  }
  .pubs-badge {
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: 20px; text-transform: uppercase; letter-spacing: .4px;
    background: #fef3e2; color: #a06c00;
  }

  .pubs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.25rem;
  }

  .pubs-card {
    background: #fff;
    border-radius: 16px;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 10px;
    text-decoration: none;
    color: inherit;
    border: 1px solid transparent;
    transition: transform .18s, box-shadow .18s;
  }
  .pubs-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,.10);
    border-color: #e5e0d5;
  }

  .pubs-card-tag {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: 20px; width: fit-content;
    text-transform: uppercase; letter-spacing: .4px;
    background: #fef3e2; color: #a06c00;
  }

  .pubs-card-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: #c28a2e;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }

  .pubs-card-title { font-size: 16px; font-weight: 700; color: #1a1a1a; }

  .pubs-card-footer {
    display: flex; padding-top: 10px;
    border-top: 1px solid #f0ece3; margin-top: auto;
  }
  .pubs-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 14px; border-radius: 8px;
    font-size: 12px; font-weight: 600;
    background: #fef3e2; color: #a06c00;
    transition: opacity .15s;
  }
  .pubs-btn:hover { opacity: .8; }

  .pubs-empty {
    grid-column: 1 / -1;
    background: #fff; border-radius: 16px;
    padding: 2.5rem 1rem; text-align: center;
    color: #aaa; font-size: 14px;
  }
</style>

<div class="pubs-wrapper">

  <div class="pubs-section-title">
    Publications <span class="pubs-badge">📰 All</span>
  </div>

  <div class="pubs-grid">
    {% for p in publications %}
    <a class="pubs-card" href="/publication/{{ p.0 }}/">
      <span class="pubs-card-tag">📰 Publication</span>
      <div class="pubs-card-icon">📰</div>
      <div class="pubs-card-title">{{ p.1 }}</div>
      <div class="pubs-card-footer">
        <span class="pubs-btn">→ View</span>
      </div>
    </a>
    {% empty %}
    <div class="pubs-empty">No publications yet. Be the first to create one!</div>
    {% endfor %}
  </div>

</div>

{% endblock %}
