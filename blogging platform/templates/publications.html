{% extends 'base.html' %}
{% block content %}

<style>
  .pubs-wrapper { 
    max-width: 1200px; 
    margin: 0 auto; 
    padding: 3rem 1.5rem 5rem; 
  }

  /* ── Page Header ── */
  .pubs-section-title {
    font-size: 24px; 
    font-weight: 700; 
    color: #1a1612;
    margin-bottom: 2rem;
    display: flex; 
    align-items: center; 
    gap: 12px;
    letter-spacing: -0.5px;
  }

  .pubs-badge {
    font-size: 12px; 
    font-weight: 600; 
    padding: 4px 12px;
    border-radius: 20px; 
    text-transform: uppercase; 
    letter-spacing: 0.5px;
    background: #FAEEDA; 
    color: #BA7517;
  }

  /* ── Grid Layout ── */
  .pubs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  /* ── Card Styling ── */
  .pubs-card {
    background: #fff;
    border-radius: 16px;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: inherit;
    border: 1px solid #eaeaea;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Smooth spring animation */
    position: relative;
  }

  .pubs-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 24px rgba(186, 117, 23, 0.08); /* Soft gold shadow */
    border-color: #BA7517;
  }

  /* Top row of the card (Icon + Tag) */
  .pubs-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1rem;
  }

  .pubs-card-tag {
    display: inline-flex; 
    align-items: center; 
    font-size: 10px; 
    font-weight: 700; 
    padding: 4px 10px;
    border-radius: 8px; 
    text-transform: uppercase; 
    letter-spacing: 0.5px;
    background: #f8f9fa; 
    color: #888;
    border: 1px solid #eee;
  }

  /* The Icon Box */
  .pubs-card-icon {
    width: 48px; 
    height: 48px; 
    border-radius: 12px;
    background: #FAEEDA;
    color: #BA7517;
    display: flex; 
    align-items: center; 
    justify-content: center;
    transition: transform 0.3s ease;
  }

  .pubs-card:hover .pubs-card-icon {
    transform: scale(1.05); /* Icon pops slightly on hover */
    background: #BA7517;
    color: #fff;
  }

  /* Title */
  .pubs-card-title { 
    font-size: 18px; 
    font-weight: 700; 
    color: #1a1a1a; 
    line-height: 1.3;
    margin-bottom: 1.5rem;
  }

  /* Footer & Action Button */
  .pubs-card-footer {
    margin-top: auto;
    padding-top: 1rem;
    border-top: 1px solid #f0ece3;
    display: flex;
    align-items: center;
  }

  .pubs-btn {
    display: flex; 
    align-items: center; 
    gap: 6px;
    font-size: 13px; 
    font-weight: 600;
    color: #BA7517;
    transition: gap 0.2s ease;
  }

  /* The arrow slides slightly to the right when hovering over the card */
  .pubs-card:hover .pubs-btn { 
    gap: 12px; 
  }

  .pubs-empty {
    grid-column: 1 / -1;
    background: #fff; 
    border-radius: 16px;
    padding: 4rem 2rem; 
    text-align: center;
    color: #888; 
    font-size: 15px;
    border: 1px dashed #ddd;
  }
</style>

<div class="pubs-wrapper">

  <div class="pubs-section-title">
    Publications <span class="pubs-badge">Directory</span>
  </div>

  <div class="pubs-grid">
    {% for p in publications %}
    <a class="pubs-card" href="/publication/{{ p.0 }}/">
      
      <div class="pubs-card-header">
        <div class="pubs-card-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
          </svg>
        </div>
        <span class="pubs-card-tag">Editorial</span>
      </div>

      <div class="pubs-card-title">{{ p.1 }}</div>
      
      <div class="pubs-card-footer">
        <span class="pubs-btn">
          Explore Publication 
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </span>
      </div>

    </a>
    {% empty %}
    <div class="pubs-empty">
      <div style="font-size: 32px; margin-bottom: 10px;">📰</div>
      No publications yet. Be the first to start an editorial space!
    </div>
    {% endfor %}
  </div>

</div>

{% endblock %}
