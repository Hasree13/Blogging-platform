{% extends 'base.html' %}
{% block content %}
<div style="max-width: 400px; margin: 4rem auto; padding: 2.5rem; background: #fff; border-radius: 16px; border: 1px solid #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.03);">
    <h2 style="margin:0 0 5px 0; font-size:22px; color:#1a1612;">Reset Password</h2>
    <p style="font-size:13px; color:#888; margin-bottom:20px;">Recover your account access.</p>

    {% if error %}
        <div style="background:#fef2f2; color:#dc2626; padding:10px; border-radius:8px; font-size:13px; margin-bottom:15px; border: 1px solid #fecaca;">{{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        {% if step == 1 or not step %}
            <input type="hidden" name="step" value="1">
            <div style="margin-bottom:15px;">
                <label style="display:block; font-size:11px; font-weight:600; color:#999; text-transform:uppercase; margin-bottom:5px;">Email Address</label>
                <input type="email" name="email" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; background:#faf9f7;">
            </div>
            <button type="submit" style="width:100%; padding:10px; background:#BA7517; color:#fff; border:none; border-radius:8px; font-weight:600; cursor:pointer;">Find Account</button>
        {% elif step == 2 %}
            <input type="hidden" name="step" value="2">
            <input type="hidden" name="email" value="{{ email }}">
            
            <div style="margin-bottom:15px; background:#faf9f7; padding:12px; border-radius:8px; border:1px solid #eee;">
                <span style="font-size:11px; color:#BA7517; font-weight:700; text-transform:uppercase;">Security Question:</span>
                <div style="font-size:14px; font-weight:500; color:#111; margin-top:4px;">{{ question }}</div>
            </div>

            <div style="margin-bottom:15px;">
                <label style="display:block; font-size:11px; font-weight:600; color:#999; text-transform:uppercase; margin-bottom:5px;">Your Answer</label>
                <input type="text" name="security_answer" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; background:#faf9f7;">
            </div>

            <div style="margin-bottom:20px;">
                <label style="display:block; font-size:11px; font-weight:600; color:#999; text-transform:uppercase; margin-bottom:5px;">New Password</label>
                <input type="password" name="new_password" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; background:#faf9f7;">
            </div>

            <button type="submit" style="width:100%; padding:10px; background:#1a1612; color:#fff; border:none; border-radius:8px; font-weight:600; cursor:pointer;">Secure & Reset Password</button>
        {% endif %}
    </form>
</div>
{% endblock %}
