{% extends 'base.html' %}
{% block content %}

<style>
  .donations-wrapper { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  .donations-section-title {
    font-size: 20px; font-weight: 700; color: #1a1a1a;
    margin-bottom: 1.25rem;
    display: flex; align-items: center; gap: 10px;
  }
  .donations-badge {
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: 20px; text-transform: uppercase; letter-spacing: .4px;
    background: #eaf6ea; color: #2e7d32;
  }

  .donations-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 1.25rem;
  }

  .donation-card {
    background: #fff;
    border-radius: 16px;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 10px;
    border: 1px solid transparent;
    transition: transform .18s, box-shadow .18s;
  }
  .donation-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,.10);
    border-color: #e5e0d5;
  }

  .donation-tag {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: 20px; width: fit-content;
    text-transform: uppercase; letter-spacing: .4px;
    background: #eaf6ea; color: #2e7d32;
  }

  .donation-amount {
    font-size: 26px; font-weight: 700; color: #1a1a1a;
  }
  .donation-amount span { font-size: 15px; color: #aaa; font-weight: 400; }

  .donation-donor { font-size: 14px; font-weight: 600; color: #333; }

  .donation-footer {
    display: flex; flex-direction: column; gap: 6px;
    padding-top: 10px; border-top: 1px solid #f0ece3;
    margin-top: auto;
  }
  .donation-blog-link {
    font-size: 13px; font-weight: 600; color: #c28a2e;
    text-decoration: none;
  }
  .donation-blog-link:hover { text-decoration: underline; }
  .donation-date { font-size: 11px; color: #aaa; }

  .donations-empty {
    grid-column: 1 / -1;
    background: #fff; border-radius: 16px;
    padding: 2.5rem 1rem; text-align: center;
    color: #aaa; font-size: 14px;
  }
</style>

<div class="donations-wrapper">

  <div class="donations-section-title">
    💰 Your Donations <span class="donations-badge">Received</span>
  </div>

  <div class="donations-grid">
    {% for d in donations %}
    <div class="donation-card">
      <span class="donation-tag">💸 Donation</span>
      <div class="donation-amount">₹{{ d.0 }} <span>received</span></div>
      <div class="donation-donor">From: {{ d.1 }}</div>
      <div class="donation-footer">
        <a class="donation-blog-link" href="/blog/{{ d.4 }}">📝 {{ d.2 }}</a>
        <div class="donation-date">📅 {{ d.3 }}</div>
      </div>
    </div>
    {% empty %}
    <div class="donations-empty">No donations received yet. Keep creating great content!</div>
    {% endfor %}
  </div>

</div>

{% endblock %}
