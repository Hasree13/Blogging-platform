{% extends 'base.html' %}
{% block content %}

<style>
  .notauthor-wrapper { max-width: 600px; margin: 0 auto; padding: 4rem 1.5rem; }

  .notauthor-card {
    background: #fff;
    border-radius: 16px;
    padding: 2.5rem 2rem;
    border: 1px solid #e5e0d5;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 1rem;
  }

  .notauthor-icon { font-size: 48px; line-height: 1; }

  .notauthor-card h2 {
    font-size: 22px; font-weight: 700; color: #1a1a1a; margin: 0;
  }

  .notauthor-card p {
    font-size: 14px; color: #777; line-height: 1.6; margin: 0;
  }

  .notauthor-actions {
    display: flex; flex-wrap: wrap; gap: 10px;
    justify-content: center; margin-top: 0.5rem;
  }

  .btn-join {
    padding: 10px 26px;
    background: #c28a2e; color: #fff;
    border: none; border-radius: 10px;
    font-size: 14px; font-weight: 600;
    text-decoration: none; cursor: pointer;
    transition: opacity .15s;
    display: inline-block;
  }
  .btn-join:hover { opacity: .88; }

  .btn-home {
    padding: 10px 20px;
    background: #f0f0f0; color: #555;
    border-radius: 10px;
    font-size: 14px; font-weight: 600;
    text-decoration: none;
    transition: opacity .15s;
    display: inline-block;
  }
  .btn-home:hover { opacity: .8; }
</style>

<div class="notauthor-wrapper">
  <div class="notauthor-card">

    <div class="notauthor-icon">✍️</div>

    <h2>You are not an author yet</h2>

    <p>You must be an author to write and publish blogs.<br>Join as an author to start sharing your stories with the world.</p>

    <div class="notauthor-actions">
      <a href="/toggle-author/" class="btn-join">✨ Join as Author</a>
      <a href="/home/" class="btn-home">← Back to Home</a>
    </div>

  </div>
</div>

{% endblock %}
