{% extends 'base.html' %}
{% block content %}

<style>
  .pub-wrapper { max-width: 600px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  .pub-card {
    background: #fff;
    border-radius: 16px;
    padding: 2rem 1.75rem;
    border: 1px solid #e5e0d5;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .pub-card h2 { font-size: 22px; font-weight: 700; color: #1a1a1a; margin: 0; }

  .pub-field label {
    display: block;
    font-size: 13px; font-weight: 600; color: #555;
    margin-bottom: 6px;
  }

  .pub-field input[type="text"] {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #e5e0d5;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    box-sizing: border-box;
    transition: border-color .2s;
  }

  .pub-field input[type="text"]:focus { border-color: #c28a2e; }

  /* Fee notice */
  .pub-notice {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: #fffbf2;
    border: 1px solid #f0d89a;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: #7a5500;
    line-height: 1.5;
  }
  .pub-notice .notice-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .pub-notice strong { font-weight: 700; }

  /* Buttons row */
  .pub-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

  .btn-create {
    padding: 10px 24px;
    background: #c28a2e; color: #fff;
    border: none; border-radius: 10px;
    font-size: 14px; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
  }
  .btn-create:hover { opacity: .88; }

  .btn-back {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 10px 18px;
    background: #f0f0f0; color: #555;
    border-radius: 10px;
    font-size: 14px; font-weight: 600;
    text-decoration: none; transition: opacity .15s;
  }
  .btn-back:hover { opacity: .8; }
</style>

<div class="pub-wrapper">
  <div class="pub-card">

    <h2>Create New Publication</h2>

    <form method="POST" style="display:flex; flex-direction:column; gap:1.25rem;">
      {% csrf_token %}

      <div class="pub-field">
        <label for="pub-name">Publication Name</label>
        <input type="text" id="pub-name" name="name" placeholder="Enter publication name" required value="">
      </div>

      <div class="pub-notice">
        <span class="notice-icon">💡</span>
        <span><strong>Note:</strong> Creating a publication requires a yearly fee of <strong>₹4,000</strong>.</span>
      </div>

      <div class="pub-actions">
        <button type="submit" class="btn-create">Create Publication</button>
        <a href="/publications/" class="btn-back">← Back to Publications</a>
      </div>

    </form>

  </div>
</div>

{% endblock %}
