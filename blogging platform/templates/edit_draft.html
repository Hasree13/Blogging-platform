{% extends 'base.html' %}
{% block content %}

<style>
.container {
    max-width: 700px;
    margin: auto;
    padding: 20px;
}

input[name="title"] {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 16px;
    border: 1px solid #ccc;
    border-radius: 6px;
    box-sizing: border-box;
}

textarea {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 16px;
    border: 1px solid #ccc;
    border-radius: 6px;
    resize: vertical;
    box-sizing: border-box;
}

.section {
    margin-bottom: 20px;
}

button {
    padding: 10px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin-right: 10px;
}

.save-btn    { background-color: #ddd; }
.publish-btn { background-color: #4CAF50; color: white; }

/* ── Checkbox alignment fix ── */
.checkbox-label {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    font-size: 15px;
    line-height: 1.4;
    margin-bottom: 10px;
    user-select: none;
}

.checkbox-label input[type="checkbox"] {
    width: 17px;
    height: 17px;
    margin: 0;
    flex-shrink: 0;
    cursor: pointer;
    accent-color: #c28a2e;
}

/* Premium toggle card */
.premium-toggle {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #fffbf2;
    border: 1px solid #f0d89a;
    border-radius: 10px;
    padding: 12px 16px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 500;
    color: #7a5500;
    user-select: none;
}

.premium-toggle input[type="checkbox"] {
    width: 17px;
    height: 17px;
    margin: 0;
    flex-shrink: 0;
    cursor: pointer;
    accent-color: #c28a2e;
}

.premium-toggle .star { font-size: 18px; }

    /* Layout for the category container */
.pill-group {
    display: flex;
    flex-wrap: wrap; /* Allows pills to flow into multiple rows */
    gap: 10px;       /* Space between pills */
    margin-bottom: 20px;
}

/* Base style for the pill */
.pill-label {
    display: inline-block;
    padding: 8px 18px;
    border: 1.5px solid #d1d1d1;
    border-radius: 25px; /* Rounded pill shape */
    background-color: #f9f9f9;
    color: #444;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
}

/* Hover effect */
.pill:hover .pill-label {
    border-color: #BA7517; /* Matches your brand color */
    background-color: #fff9f0;
}

/* Active/Checked state */
input:checked + .pill-label {
    background-color: #BA7517;
    border-color: #BA7517;
    color: white;
    box-shadow: 0 2px 5px rgba(186, 117, 23, 0.3);
}
</style>

<div class="container">
    <h2>Edit Draft</h2>

    <form method="POST">
        {% csrf_token %}

        <!-- Title -->
        <input name="title" value="{{ draft.0 }}" placeholder="Enter title">

        <!-- Content -->
        <textarea name="content" rows="10" placeholder="Write your story...">{{ draft.1 }}</textarea>

        <!-- Premium Toggle -->
        <div class="section">
            <label class="premium-toggle">
                <input type="checkbox" name="is_premium" {% if draft.2 %}checked{% endif %}>
                <span class="star">⭐</span>
                Make this a Premium Blog
            </label>
        </div>

        <!-- Categories -->
        <div class="section">
            <h4>Select Categories</h4>
            <div class="pill-group">
        {% for cat in categories %}
        <label class="pill">
            <input type="checkbox" name="categories" value="{{ cat.0 }}" 
                   {% if cat.0 in selected_categories %}checked{% endif %} hidden>
            
            <span class="pill-label">{{ cat.1 }}</span>
        </label>
        {% endfor %}
    </div>
        </div>

        <!-- Buttons -->
        <button class="save-btn" name="action" value="save">Save Draft</button>
        <button class="publish-btn" name="action" value="publish">Publish</button>

    </form>
</div>

{% endblock %}
